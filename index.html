<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio</title>
    <!-- Google Fonts: ポップな雰囲気に合う丸ゴシック体 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;800&family=Varela+Round&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body {
            font-family: 'M PLUS Rounded 1c', sans-serif;
            background-color: #f8f9fa; /* クリーンな背景 */
            overflow-x: hidden;
        }

        /* カスタムボタンのデザイン 
          画像のような「マットで立体的かつ発光している」質感を再現
        */
        .nav-btn {
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            overflow: hidden;
            border: none;
        }

        /* 各ボタンの色定義 (ShadowとGradient) */
        
        /* Projects: Cyan */
        .btn-cyan {
            background: linear-gradient(135deg, #22d3ee 0%, #06b6d4 100%);
            box-shadow: 
                0 10px 20px -5px rgba(6, 182, 212, 0.4),
                0 4px 6px -2px rgba(6, 182, 212, 0.2),
                inset 0 2px 4px rgba(255, 255, 255, 0.4), /* 上部のハイライト */
                inset 0 -4px 4px rgba(0, 0, 0, 0.05); /* 下部の影 */
        }
        .btn-cyan:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 
                0 20px 30px -8px rgba(6, 182, 212, 0.6),
                0 0 15px rgba(34, 211, 238, 0.8); /* 発光強化 */
        }

        /* Skills: Magenta */
        .btn-magenta {
            background: linear-gradient(135deg, #f0abfc 0%, #e879f9 50%, #d946ef 100%);
            box-shadow: 
                0 10px 20px -5px rgba(217, 70, 239, 0.4),
                0 4px 6px -2px rgba(217, 70, 239, 0.2),
                inset 0 2px 4px rgba(255, 255, 255, 0.4),
                inset 0 -4px 4px rgba(0, 0, 0, 0.05);
        }
        .btn-magenta:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 
                0 20px 30px -8px rgba(217, 70, 239, 0.6),
                0 0 15px rgba(240, 171, 252, 0.8);
        }

        /* About: Orange */
        .btn-orange {
            background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%);
            box-shadow: 
                0 10px 20px -5px rgba(245, 158, 11, 0.4),
                0 4px 6px -2px rgba(245, 158, 11, 0.2),
                inset 0 2px 4px rgba(255, 255, 255, 0.4),
                inset 0 -4px 4px rgba(0, 0, 0, 0.05);
        }
        .btn-orange:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 
                0 20px 30px -8px rgba(245, 158, 11, 0.6),
                0 0 15px rgba(251, 191, 36, 0.8);
        }

        /* Contact: Lime */
        .btn-lime {
            background: linear-gradient(135deg, #a3e635 0%, #84cc16 100%);
            box-shadow: 
                0 10px 20px -5px rgba(132, 204, 22, 0.4),
                0 4px 6px -2px rgba(132, 204, 22, 0.2),
                inset 0 2px 4px rgba(255, 255, 255, 0.4),
                inset 0 -4px 4px rgba(0, 0, 0, 0.05);
        }
        .btn-lime:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 
                0 20px 30px -8px rgba(132, 204, 22, 0.6),
                0 0 15px rgba(163, 230, 53, 0.8);
        }

        /* アバターの浮遊アニメーション */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }
        .avatar-float {
            animation: float 4s ease-in-out infinite;
        }

        /* 光の輪のアニメーション */
        @keyframes pulse-ring {
            0% { transform: scale(0.8); opacity: 0.5; }
            50% { transform: scale(1.1); opacity: 0.2; }
            100% { transform: scale(0.8); opacity: 0.5; }
        }
        .glow-ring {
            animation: pulse-ring 3s infinite ease-in-out;
        }

        /* 背景の装飾パーティクル */
        .particle {
            position: absolute;
            opacity: 0.6;
            animation: float-particle 6s infinite ease-in-out;
        }
        @keyframes float-particle {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(10px, -15px) rotate(10deg); }
            50% { transform: translate(-5px, 10px) rotate(-10deg); }
            75% { transform: translate(-10px, -5px) rotate(5deg); }
        }

        /* モーダル表示のアニメーション */
        .modal-enter {
            opacity: 0;
            transform: scale(0.9);
        }
        .modal-enter-active {
            opacity: 1;
            transform: scale(1);
            transition: opacity 300ms, transform 300ms cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .modal-exit {
            opacity: 1;
            transform: scale(1);
        }
        .modal-exit-active {
            opacity: 0;
            transform: scale(0.9);
            transition: opacity 200ms, transform 200ms;
        }
        
        /* Scrollbar styling for modal content */
        .custom-scrollbar::-webkit-scrollbar {
            width: 8px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #d1d5db; 
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #9ca3af; 
        }

    </style>
</head>
<body class="flex items-center justify-center min-h-screen relative selection:bg-cyan-200">

    <!-- 背景装飾 (SVGパーティクル) -->
    <div class="absolute inset-0 pointer-events-none overflow-hidden -z-10">
        <!-- 左上の装飾 -->
        <svg class="particle text-yellow-300" style="top: 15%; left: 15%; width: 30px; animation-delay: 0s;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
        <svg class="particle text-cyan-300" style="top: 25%; left: 10%; width: 20px; animation-delay: 1s;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><circle cx="12" cy="12" r="10"/></svg>
        <svg class="particle text-pink-300" style="top: 10%; left: 30%; width: 25px; animation-delay: 2s;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M4.93 4.93l14.14 14.14M19.07 4.93L4.93 19.07"/></svg>
        
        <!-- 中央付近の装飾 -->
        <svg class="particle text-orange-300" style="top: 50%; left: 40%; width: 40px; animation-delay: 1.5s;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M12 2v20M2 12h20"/></svg>

        <!-- アバター周りの紙吹雪 -->
        <div class="absolute top-1/2 left-1/4 transform -translate-x-1/2 -translate-y-1/2 w-96 h-96 pointer-events-none">
            <div class="absolute w-4 h-4 bg-yellow-400 rounded-full top-10 left-10 animate-bounce" style="animation-duration: 3s;"></div>
            <div class="absolute w-3 h-3 bg-cyan-400 rounded-sm bottom-20 right-10 animate-pulse"></div>
            <div class="absolute w-6 h-1 bg-pink-400 rotate-45 top-1/2 right-0"></div>
        </div>
    </div>

    <!-- メインコンテンツ -->
    <main class="container mx-auto px-4 max-w-5xl flex flex-col md:flex-row items-center justify-center gap-12 md:gap-24 relative z-10">
        
        <!-- 左側: キャラクター / アバターエリア -->
        <div class="relative w-full md:w-1/2 flex justify-center items-center">
            <!-- 光の輪エフェクト (背景) -->
            <div class="absolute w-80 h-80 bg-cyan-100 rounded-full blur-3xl opacity-60 glow-ring"></div>
            <div class="absolute w-64 h-64 bg-white rounded-full opacity-40 blur-xl animate-pulse"></div>

            <!-- イラスト (SVGで構成) -->
            <div class="relative z-10 w-64 h-auto avatar-float">
               <!-- 簡易的なキャラクターイラストSVG -->
               <svg viewBox="0 0 200 250" fill="none" xmlns="http://www.w3.org/2000/svg" class="drop-shadow-2xl filter">
                    <!-- 体の輝き(背後) -->
                    <defs>
                        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
                            <feGaussianBlur stdDeviation="10" result="blur" />
                            <feComposite in="SourceGraphic" in2="blur" operator="over" />
                        </filter>
                    </defs>

                    <!-- 体 -->
                    <path d="M50 140 C 30 160, 30 220, 30 250 L 170 250 C 170 220, 170 160, 150 140 C 130 120, 70 120, 50 140" fill="#E0F7FA" stroke="#0891B2" stroke-width="4"/>
                    
                    <!-- 腕 (左) -->
                    <path d="M50 150 Q 20 180 20 220" stroke="#0891B2" stroke-width="4" stroke-linecap="round" fill="none"/>
                    <path d="M20 220 L 15 235 M 20 220 L 25 235 M 20 220 L 10 225" stroke="#0891B2" stroke-width="3" stroke-linecap="round"/>

                    <!-- 腕 (右 - 挨拶している手) -->
                    <path d="M150 150 Q 180 140 190 110" stroke="#0891B2" stroke-width="4" stroke-linecap="round" fill="#E0F7FA"/>
                    <!-- 手のひら -->
                    <path d="M190 110 L 185 95 M 190 110 L 198 95 M 190 110 L 205 105" stroke="#0891B2" stroke-width="3" stroke-linecap="round"/>

                    <!-- 頭 -->
                    <circle cx="100" cy="80" r="45" fill="#E0F7FA" stroke="#0891B2" stroke-width="4"/>
                    
                    <!-- 髪の毛 (濃い青) -->
                    <path d="M55 80 C 50 40, 70 20, 100 20 C 130 20, 150 40, 145 80 C 145 60, 130 35, 100 35 C 70 35, 55 60, 55 80" fill="#155E75"/>
                    <path d="M100 20 Q 110 10 120 15" stroke="#155E75" stroke-width="4" stroke-linecap="round"/>
                    
                    <!-- 顔のパーツ -->
                    <!-- 目 -->
                    <circle cx="85" cy="80" r="4" fill="#155E75"/>
                    <circle cx="115" cy="80" r="4" fill="#155E75"/>
                    <!-- 眉 -->
                    <path d="M80 70 Q 85 68 90 70" stroke="#155E75" stroke-width="2" fill="none"/>
                    <path d="M110 70 Q 115 68 120 70" stroke="#155E75" stroke-width="2" fill="none"/>
                    <!-- 口 -->
                    <path d="M90 95 Q 100 105 110 95" stroke="#155E75" stroke-width="2" fill="none" stroke-linecap="round"/>

                    <!-- 魔法の輪のエフェクト -->
                    <ellipse cx="100" cy="180" rx="90" ry="20" fill="none" stroke="#22D3EE" stroke-width="3" stroke-opacity="0.6" transform="rotate(-10 100 180)" />
                    <ellipse cx="100" cy="180" rx="90" ry="20" fill="none" stroke="white" stroke-width="1" stroke-opacity="0.8" stroke-dasharray="10 20" transform="rotate(-10 100 180)" />
               </svg>
            </div>
            
            <!-- こんにちは吹き出し -->
            <div class="absolute -top-10 right-10 bg-white px-4 py-2 rounded-2xl shadow-lg border-2 border-cyan-100 animate-bounce" style="animation-duration: 2s;">
                <p class="text-cyan-800 font-bold text-sm">Hello! 👋</p>
                <div class="absolute bottom-0 left-4 transform translate-y-1/2 rotate-45 w-3 h-3 bg-white border-b-2 border-r-2 border-cyan-100"></div>
            </div>
        </div>

        <!-- 右側: ナビゲーションメニュー -->
        <nav class="w-full md:w-1/2 flex flex-col gap-6 items-center md:items-start" id="menu-container">
            
            <!-- Projects Button -->
            <button onclick="openModal('projects')" class="nav-btn btn-cyan w-full md:w-80 h-20 rounded-full flex items-center px-4 group cursor-pointer text-left">
                <div class="w-14 h-14 bg-black rounded-full flex items-center justify-center shrink-0 shadow-inner group-hover:scale-110 transition-transform duration-300">
                    <i data-lucide="folder" class="text-white w-7 h-7"></i>
                </div>
                <span class="ml-6 text-2xl font-bold text-white tracking-wide drop-shadow-md">Projects</span>
            </button>

            <!-- Skills Button -->
            <button onclick="openModal('skills')" class="nav-btn btn-magenta w-full md:w-80 h-20 rounded-full flex items-center px-4 group cursor-pointer text-left">
                <div class="w-14 h-14 bg-black rounded-full flex items-center justify-center shrink-0 shadow-inner group-hover:scale-110 transition-transform duration-300">
                    <i data-lucide="layers" class="text-white w-7 h-7"></i>
                </div>
                <span class="ml-6 text-2xl font-bold text-white tracking-wide drop-shadow-md">Skills</span>
            </button>

            <!-- About Button -->
            <button onclick="openModal('about')" class="nav-btn btn-orange w-full md:w-80 h-20 rounded-full flex items-center px-4 group cursor-pointer text-left">
                <div class="w-14 h-14 bg-black rounded-full flex items-center justify-center shrink-0 shadow-inner group-hover:scale-110 transition-transform duration-300">
                    <i data-lucide="info" class="text-white w-7 h-7"></i>
                </div>
                <span class="ml-6 text-2xl font-bold text-white tracking-wide drop-shadow-md">About</span>
            </button>

            <!-- Contact Button -->
            <button onclick="openModal('contact')" class="nav-btn btn-lime w-full md:w-80 h-20 rounded-full flex items-center px-4 group cursor-pointer text-left">
                <div class="w-14 h-14 bg-black rounded-full flex items-center justify-center shrink-0 shadow-inner group-hover:scale-110 transition-transform duration-300">
                    <i data-lucide="phone" class="text-white w-7 h-7"></i>
                </div>
                <span class="ml-6 text-2xl font-bold text-black tracking-wide drop-shadow-sm opacity-80">Contact</span>
            </button>

        </nav>
    </main>

    <!-- モーダル / コンテンツ表示エリア (Hidden by default) -->
    <div id="modal-overlay" class="fixed inset-0 bg-black/40 backdrop-blur-sm z-40 hidden flex items-center justify-center p-4 transition-opacity duration-300 opacity-0" onclick="closeModal()">
        
        <!-- モーダルコンテンツコンテナ -->
        <div id="modal-content" class="bg-white w-full max-w-2xl rounded-3xl shadow-2xl relative overflow-hidden transform scale-90 transition-transform duration-300" onclick="event.stopPropagation()">
            
            <!-- ヘッダー (色が変わる) -->
            <div id="modal-header" class="h-24 flex items-center px-8 relative overflow-hidden">
                <h2 id="modal-title" class="text-3xl font-extrabold text-white relative z-10 drop-shadow-md">Title</h2>
                <!-- 装飾円 -->
                <div class="absolute -right-10 -top-10 w-40 h-40 bg-white/20 rounded-full"></div>
                <div class="absolute right-20 top-10 w-20 h-20 bg-white/10 rounded-full"></div>
                
                <!-- 閉じるボタン -->
                <button onclick="closeModal()" class="absolute top-6 right-6 text-white/80 hover:text-white hover:bg-white/20 rounded-full p-2 transition-colors">
                    <i data-lucide="x" class="w-6 h-6"></i>
                </button>
            </div>

            <!-- ボディ -->
            <div id="modal-body" class="p-8 max-h-[60vh] overflow-y-auto custom-scrollbar text-gray-700">
                <!-- JSでコンテンツを注入 -->
            </div>

            <!-- フッター -->
            <div class="p-4 border-t border-gray-100 flex justify-end">
                <button onclick="closeModal()" class="px-6 py-2 rounded-full bg-gray-100 hover:bg-gray-200 text-gray-700 font-bold transition-colors">
                    Close
                </button>
            </div>
        </div>
    </div>

    <script>
        // Lucideアイコンの初期化
        lucide.createIcons();

        // コンテンツデータ
        const contents = {
            projects: {
                title: "My Projects",
                colorClass: "btn-cyan", // ヘッダーの背景色として利用
                headerGradient: "linear-gradient(135deg, #22d3ee 0%, #06b6d4 100%)",
                html: `
                    <div class="space-y-6">
                        <div class="group bg-slate-50 p-4 rounded-xl border border-slate-100 hover:shadow-lg transition-shadow">
                            <h3 class="text-xl font-bold text-cyan-600 mb-2">E-Commerce App</h3>
                            <p class="text-sm text-gray-600 mb-3">React, Node.js, Stripeを使用したモダンなECサイト。</p>
                            <div class="flex gap-2">
                                <span class="px-2 py-1 bg-cyan-100 text-cyan-700 text-xs rounded-md font-bold">React</span>
                                <span class="px-2 py-1 bg-blue-100 text-blue-700 text-xs rounded-md font-bold">Node.js</span>
                            </div>
                        </div>
                        <div class="group bg-slate-50 p-4 rounded-xl border border-slate-100 hover:shadow-lg transition-shadow">
                            <h3 class="text-xl font-bold text-cyan-600 mb-2">Portfolio V1</h3>
                            <p class="text-sm text-gray-600 mb-3">以前作成したシンプルなポートフォリオサイト。</p>
                            <div class="flex gap-2">
                                <span class="px-2 py-1 bg-orange-100 text-orange-700 text-xs rounded-md font-bold">HTML/CSS</span>
                                <span class="px-2 py-1 bg-yellow-100 text-yellow-700 text-xs rounded-md font-bold">JS</span>
                            </div>
                        </div>
                         <div class="group bg-slate-50 p-4 rounded-xl border border-slate-100 hover:shadow-lg transition-shadow">
                            <h3 class="text-xl font-bold text-cyan-600 mb-2">Task Manager</h3>
                            <p class="text-sm text-gray-600 mb-3">生産性を向上させるためのタスク管理ツール。</p>
                            <div class="flex gap-2">
                                <span class="px-2 py-1 bg-green-100 text-green-700 text-xs rounded-md font-bold">Vue.js</span>
                                <span class="px-2 py-1 bg-gray-100 text-gray-700 text-xs rounded-md font-bold">Firebase</span>
                            </div>
                        </div>
                    </div>
                `
            },
            skills: {
                title: "My Skills",
                headerGradient: "linear-gradient(135deg, #f0abfc 0%, #d946ef 100%)",
                html: `
                    <div class="grid grid-cols-2 gap-4">
                        <div class="p-4 bg-pink-50 rounded-xl">
                            <h4 class="font-bold text-pink-600 mb-2">Frontend</h4>
                            <ul class="space-y-1 text-sm text-gray-600">
                                <li>• HTML5 / CSS3</li>
                                <li>• JavaScript (ES6+)</li>
                                <li>• React / Next.js</li>
                                <li>• Tailwind CSS</li>
                            </ul>
                        </div>
                        <div class="p-4 bg-purple-50 rounded-xl">
                            <h4 class="font-bold text-purple-600 mb-2">Backend</h4>
                            <ul class="space-y-1 text-sm text-gray-600">
                                <li>• Node.js</li>
                                <li>• Python</li>
                                <li>• PostgreSQL</li>
                                <li>• Firebase</li>
                            </ul>
                        </div>
                        <div class="p-4 bg-indigo-50 rounded-xl col-span-2">
                            <h4 class="font-bold text-indigo-600 mb-2">Tools</h4>
                            <div class="flex flex-wrap gap-2">
                                <span class="px-3 py-1 bg-white border border-indigo-100 rounded-full text-xs text-indigo-500 shadow-sm">Git</span>
                                <span class="px-3 py-1 bg-white border border-indigo-100 rounded-full text-xs text-indigo-500 shadow-sm">Figma</span>
                                <span class="px-3 py-1 bg-white border border-indigo-100 rounded-full text-xs text-indigo-500 shadow-sm">VS Code</span>
                                <span class="px-3 py-1 bg-white border border-indigo-100 rounded-full text-xs text-indigo-500 shadow-sm">Docker</span>
                            </div>
                        </div>
                    </div>
                `
            },
            about: {
                title: "About Me",
                headerGradient: "linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%)",
                html: `
                    <div class="flex flex-col items-center text-center space-y-4">
                        <div class="w-24 h-24 bg-orange-100 rounded-full flex items-center justify-center text-4xl">
                            👨‍💻
                        </div>
                        <p class="text-lg text-gray-700 leading-relaxed">
                            こんにちは！私はWeb開発者として活動しています。<br>
                            美しいデザインと機能的なコードを組み合わせることが大好きです。<br>
                            新しい技術を学ぶことに情熱を持っており、常にユーザー体験の向上を目指しています。
                        </p>
                        <div class="w-full bg-orange-50 p-4 rounded-xl text-left mt-4">
                            <h4 class="font-bold text-orange-600 mb-2">Goals for 2025</h4>

                        </div>
                    </div>
                `
            },
            contact: {
                title: "Contact",
                headerGradient: "linear-gradient(135deg, #a3e635 0%, #84cc16 100%)",
                html: `
                    <form class="space-y-4" onsubmit="event.preventDefault(); alert('メッセージを送信しました！(デモ)'); closeModal();">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Name</label>
                            <input type="text" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-lime-400 focus:border-transparent outline-none transition-all" placeholder="Your Name">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                            <input type="email" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-lime-400 focus:border-transparent outline-none transition-all" placeholder="hello@example.com">

                            <label class="block text-sm font-medium text-gray-700 mb-1">Message</label>

                        </button>
                    </form>
                    <div class="mt-6 flex justify-center space-x-6 text-gray-400">
                        <a href="#" class="hover:text-lime-600 transition-colors"><i data-lucide="twitter"></i></a>
                        <a href="#" class="hover:text-lime-600 transition-colors"><i data-lucide="github"></i></a>
                        <a href="#" class="hover:text-lime-600 transition-colors"><i data-lucide="linkedin"></i></a>
                    </div>
                `
            }
        };

        const modalOverlay = document.getElementById('modal-overlay');
        const modalContent = document.getElementById('modal-content');
        const modalTitle = document.getElementById('modal-title');
        const modalHeader = document.getElementById('modal-header');
        const modalBody = document.getElementById('modal-body');

        function openModal(type) {
            const data = contents[type];
            if(!data) return;

            // コンテンツセット
            modalTitle.textContent = data.title;
            modalHeader.style.background = data.headerGradient;
            modalBody.innerHTML = data.html;

            // Lucideアイコン再描画(動的に追加されたHTML内用)
            lucide.createIcons();

            // モーダル表示
            modalOverlay.classList.remove('hidden');
            // 少し遅延させてOpacityアニメーションを開始
            setTimeout(() => {
                modalOverlay.classList.remove('opacity-0');
                modalContent.classList.remove('scale-90');
                modalContent.classList.add('scale-100');
            }, 10);
        }

        function closeModal() {
            // アニメーション逆再生
            modalOverlay.classList.add('opacity-0');
            modalContent.classList.remove('scale-100');
            modalContent.classList.add('scale-90');

            // アニメーション完了後に非表示
            setTimeout(() => {
                modalOverlay.classList.add('hidden');
            }, 300);
        }
    </script>
</body>
</html>
