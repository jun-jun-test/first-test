<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio</title>
    
    <!-- Tailwind CSS (スタイリング用) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome (アイコン用) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts (フォント) -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Noto Sans JP', sans-serif;
            background-color: #fafafa; /* インスタグラムのような薄いグレー背景 */
        }
        
        /* インスタグラム風グラデーション定義 */
        .insta-gradient-text {
            background: -webkit-linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .insta-gradient-bg {
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
        }

        .insta-border {
            position: relative;
            background: #fff;
            padding: 3px;
            border-radius: 50%;
        }
        
        .insta-border::after {
            content: '';
            position: absolute;
            top: -2px; left: -2px; right: -2px; bottom: -2px;
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
            z-index: -1;
            border-radius: 50%;
        }

        /* アニメーション */
        .fade-in {
            animation: fadeIn 0.4s ease-in-out;
        }

        .slide-up {
            animation: slideUp 0.4s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
    </style>
</head>
<body class="text-gray-800 antialiased min-h-screen flex flex-col items-center justify-center py-8 px-4">

    <!-- メインコンテンツコンテナ（スマホ画面サイズを意識） -->
    <main id="app" class="w-full max-w-md bg-white rounded-xl shadow-lg overflow-hidden min-h-[600px] relative">
        <!-- コンテンツはJavaScriptによってここに描画されます -->
    </main>

    <!-- フッター -->
    <footer class="mt-8 text-gray-400 text-sm">
        &copy; 2024 My Portfolio
    </footer>

    <script>
        // --- データ定義 (ここを編集してあなたの情報を入れてください) ---
        const profileData = {
            name: "Yuki Tanaka",
            role: "Digital Creator & Engineer",
            bio: "デザインとテクノロジーの力で、新しい価値を創造します。シンプルで直感的なUI/UXが得意です。",
            image: "https://api.dicebear.com/7.x/avataaars/svg?seed=Yuki&backgroundColor=ffdfbf", // プレースホルダー画像
            stats: [
                { label: "Posts", value: "12" },
                { label: "Projects", value: "35" },
                { label: "Years", value: "5+" }
            ]
        };

        // スキルと詳細ページのデータ
        const skillsData = [
            {
                id: "web-dev",
                title: "Web Development",
                icon: "fa-code",
                shortDesc: "HTML/CSS/JS/React",
                color: "text-blue-500",
                details: {
                    title: "Webサイト・アプリ開発",
                    description: "モダンなフレームワークを使用したWebアプリケーション開発を行っています。パフォーマンスとアクセシビリティを重視したコーディングを心がけています。",
                    tags: ["React", "Vue.js", "Tailwind CSS", "Node.js"],
                    achievements: [
                        "ECサイトのフロントエンド構築",
                        "社内管理システムのUI刷新",
                        "ポートフォリオサイトの高速化"
                    ]
                }
            },
            {
                id: "ui-design",
                title: "UI/UX Design",
                icon: "fa-pen-nib",
                shortDesc: "Figma/Adobe XD",
                color: "text-pink-500",
                details: {
                    title: "UI/UX デザイン",
                    description: "ユーザー視点に立った使いやすいインターフェースを設計します。Figmaを使用したプロトタイピングから、デザインシステムの構築まで対応可能です。",
                    tags: ["Figma", "Adobe XD", "Prototyping", "Wireframing"],
                    achievements: [
                        "モバイルアプリのUXリサーチ",
                        "LPのデザイン及びコンバージョン改善",
                        "ブランドガイドラインの策定"
                    ]
                }
            },
            {
                id: "marketing",
                title: "Marketing",
                icon: "fa-chart-line",
                shortDesc: "SEO/SNS Analytics",
                color: "text-orange-500",
                details: {
                    title: "デジタルマーケティング",
                    description: "データに基づいたマーケティング戦略を提案します。SNS運用からSEO対策まで、認知拡大と集客をサポートします。",
                    tags: ["Google Analytics", "SEO", "Instagram Ads", "Copywriting"],
                    achievements: [
                        "オウンドメディアのPV数200%増",
                        "Instagramフォロワー獲得キャンペーン",
                        "SEO内部施策による順位向上"
                    ]
                }
            },
            {
                id: "photography",
                title: "Photography",
                icon: "fa-camera",
                shortDesc: "Portrait/Landscape",
                color: "text-purple-500",
                details: {
                    title: "写真・動画撮影",
                    description: "ブランドの世界観を表現するビジュアルコンテンツを制作します。ポートレートから商品撮影、短編動画の編集まで対応します。",
                    tags: ["Lightroom", "Premiere Pro", "Portrait", "Commercial"],
                    achievements: [
                        "飲食店メニュー写真撮影",
                        "企業プロモーションビデオ制作",
                        "イベント記録撮影"
                    ]
                }
            }
        ];

        // --- アプリケーションロジック ---
        const app = document.getElementById('app');

        // ホーム画面の描画
        function renderHome() {
            let skillsHtml = skillsData.map(skill => `
                <div onclick="renderDetail('${skill.id}')" class="cursor-pointer group">
                    <div class="flex items-center p-4 hover:bg-gray-50 transition duration-200 border-b border-gray-100">
                        <!-- アイコン -->
                        <div class="w-12 h-12 rounded-full bg-gray-50 flex items-center justify-center mr-4 group-hover:bg-gray-100 transition">
                            <div class="w-10 h-10 rounded-full border border-gray-200 flex items-center justify-center bg-white">
                                <i class="fa-solid ${skill.icon} ${skill.color} text-lg"></i>
                            </div>
                        </div>
                        <!-- テキスト -->
                        <div class="flex-1">
                            <h3 class="font-bold text-sm text-gray-800 group-hover:text-pink-600 transition">${skill.title}</h3>
                            <p class="text-xs text-gray-500">${skill.shortDesc}</p>
                        </div>
                        <!-- 矢印 -->
                        <div class="text-gray-300">
                            <i class="fa-solid fa-chevron-right text-xs"></i>
                        </div>
                    </div>
                </div>
            `).join('');

            const html = `
                <div class="fade-in pb-16">
                    <!-- ヘッダー -->
                    <div class="sticky top-0 bg-white/90 backdrop-blur-sm z-10 border-b border-gray-100 px-4 py-3 flex justify-between items-center">
                        <h1 class="font-bold text-lg insta-gradient-text" style="font-family: cursive;">Portfolio</h1>
                        <button onclick="alert('コンタクトフォームへ')" class="text-gray-800 hover:text-pink-600 transition">
                            <i class="fa-regular fa-paper-plane text-xl"></i>
                        </button>
                    </div>

                    <!-- プロフィールセクション -->
                    <div class="px-4 py-6">
                        <div class="flex items-center mb-4">
                            <!-- プロフィール画像（ストーリーリング付き） -->
                            <div class="insta-border w-20 h-20 flex-shrink-0 mr-6 cursor-pointer">
                                <img src="${profileData.image}" alt="Profile" class="w-full h-full rounded-full object-cover border-2 border-white">
                            </div>
                            
                            <!-- スタッツ -->
                            <div class="flex-1 flex justify-around text-center">
                                ${profileData.stats.map(stat => `
                                    <div class="flex flex-col">
                                        <span class="font-bold text-gray-800 text-lg">${stat.value}</span>
                                        <span class="text-xs text-gray-500">${stat.label}</span>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                        
                        <!-- 自己紹介 -->
                        <div class="mb-6">
                            <h2 class="font-bold text-gray-800 text-sm mb-1">${profileData.name}</h2>
                            <p class="text-xs text-gray-500 mb-2">${profileData.role}</p>
                            <p class="text-sm text-gray-700 leading-relaxed">${profileData.bio}</p>
                        </div>

                        <!-- アクションボタン -->
                        <div class="flex gap-2 mb-6">
                            <button onclick="alert('フォロー機能はデモです')" class="flex-1 insta-gradient-bg text-white py-1.5 rounded text-sm font-semibold shadow-sm active:opacity-90 transition">Follow</button>
                            <button onclick="alert('メッセージ機能はデモです')" class="flex-1 bg-gray-100 text-gray-800 py-1.5 rounded text-sm font-semibold border border-gray-200 active:bg-gray-200 transition">Message</button>
                        </div>
                    </div>

                    <!-- スキル一覧セクション (ストーリーズ風ハイライト) -->
                    <div class="border-t border-gray-100">
                         <div class="flex items-center justify-center py-3 border-b border-gray-100">
                             <i class="fa-solid fa-table-cells text-sm mr-2 text-gray-800"></i>
                             <span class="text-xs font-bold text-gray-800 uppercase tracking-widest">Skills & Services</span>
                         </div>
                         <div class="flex flex-col bg-white">
                            ${skillsHtml}
                         </div>
                    </div>
                </div>
            `;
            
            app.innerHTML = html;
            window.scrollTo(0, 0);
        }

        // 詳細画面の描画
        function renderDetail(skillId) {
            const skill = skillsData.find(s => s.id === skillId);
            if (!skill) return;

            const tagsHtml = skill.details.tags.map(tag => 
                `<span class="bg-gray-100 text-gray-600 text-xs px-2 py-1 rounded-md mr-2 mb-2">#${tag}</span>`
            ).join('');

            const achievementsHtml = skill.details.achievements.map(item =>
                `<li class="flex items-start mb-2 text-sm text-gray-700">
                    <i class="fa-solid fa-check text-green-500 mt-1 mr-2 text-xs"></i>
                    <span>${item}</span>
                </li>`
            ).join('');

            const html = `
                <div class="slide-up min-h-full bg-white pb-8">
                    <!-- ヘッダー (Backボタン) -->
                    <div class="sticky top-0 bg-white/95 backdrop-blur-sm z-10 border-b border-gray-100 px-4 py-3 flex items-center">
                        <button onclick="renderHome()" class="mr-4 text-gray-800 hover:text-pink-600 transition">
                            <i class="fa-solid fa-arrow-left text-lg"></i>
                        </button>
                        <h1 class="font-bold text-sm text-gray-800">Detail</h1>
                    </div>

                    <!-- メインビジュアル -->
                    <div class="w-full h-48 bg-gray-50 flex items-center justify-center mb-6 relative overflow-hidden">
                        <!-- 背景装飾 -->
                        <div class="absolute inset-0 opacity-10 insta-gradient-bg"></div>
                        <div class="w-24 h-24 rounded-full bg-white flex items-center justify-center shadow-sm z-10">
                            <i class="fa-solid ${skill.icon} ${skill.color} text-4xl"></i>
                        </div>
                    </div>

                    <!-- コンテンツ -->
                    <div class="px-6">
                        <div class="mb-6">
                            <h2 class="text-2xl font-bold text-gray-800 mb-2">${skill.details.title}</h2>
                            <div class="h-1 w-12 insta-gradient-bg rounded mb-4"></div>
                            <p class="text-gray-600 leading-7 text-sm">
                                ${skill.details.description}
                            </p>
                        </div>

                        <!-- タグ -->
                        <div class="flex flex-wrap mb-8">
                            ${tagsHtml}
                        </div>

                        <!-- 実績・できることリスト -->
                        <div class="bg-gray-50 rounded-xl p-5 border border-gray-100 mb-8">
                            <h3 class="font-bold text-gray-800 text-sm mb-3 flex items-center">
                                <i class="fa-solid fa-star text-yellow-400 mr-2"></i>
                                Main Activities
                            </h3>
                            <ul class="list-none">
                                ${achievementsHtml}
                            </ul>
                        </div>

                        <!-- CTAボタン -->
                        <button onclick="alert('${skill.title}について問い合わせる')" class="w-full insta-gradient-bg text-white py-3 rounded-lg font-bold shadow-md active:scale-95 transition duration-200">
                            このスキルについて相談する
                        </button>
                    </div>
                </div>
            `;

            app.innerHTML = html;
            window.scrollTo(0, 0);
        }

        // 初期化
        renderHome();

    </script>
</body>
</html>
